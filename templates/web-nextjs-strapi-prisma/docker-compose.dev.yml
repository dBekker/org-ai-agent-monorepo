version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  cms:
    build:
      context: .
      dockerfile: docker/Dockerfile.cms
    env_file:
      - .env.example
    depends_on:
      - postgres
    ports:
      - '1337:1337'

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    env_file:
      - .env.example
    depends_on:
      - cms
    ports:
      - '3000:3000'

volumes:
  postgres-data:
