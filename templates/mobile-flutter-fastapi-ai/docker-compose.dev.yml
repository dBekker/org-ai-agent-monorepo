version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  gateway:
    build: ./services/gateway
    env_file:
      - .env.example
    depends_on:
      - postgres
      - redis
    ports:
      - '8000:8000'

  recipes:
    build: ./services/recipes
    env_file:
      - .env.example
    depends_on:
      - postgres
    ports:
      - '8001:8001'

  assistant:
    build: ./services/assistant
    env_file:
      - .env.example
    depends_on:
      - redis
    ports:
      - '8002:8002'
